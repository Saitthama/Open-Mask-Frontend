name: Android Release

on:
  push:
    # branches: [ "main" ]
    tags:
      - 'v*' # Triggert bei jedem Push mit einem Versionstag wie 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erlaubt das Erstellen von Releases und Hochladen von Assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Run Tests
        run: flutter test

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      #- name: Build AAB
      #  run: flutter build appbundle --release
      - name: Build APK
        run: flutter build apk --release
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/open-mask.apk
      - name: Rename armeabi-v7a-APK
        run: mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/open-mask-armeabi-v7a.apk
      - name: Rename arm64-v8a-APK
        run: mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/open-mask-arm64-v8a.apk
      - name: Rename x86_64-APK
        run: mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/open-mask-x86_64.apk
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
          #  build/app/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }} # Nutzt den Tag-Namen (z.B. v1.0.0)
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Wird automatisch von GitHub bereitgestellt
